<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HERBALIFERUN 2026 Registration</title>

<style>
*{box-sizing:border-box;font-family:Arial;}
body{margin:0;background:#f4f7fb;}

.container{max-width:900px;margin:auto;padding:20px;}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.badge{
background:#2563eb;
color:white;
padding:8px 14px;
border-radius:30px;
font-size:13px;
}

.progress{display:flex;gap:10px;margin-bottom:25px;}
.bar{flex:1;height:10px;border-radius:20px;background:#ddd;}
.bar.active{background:#2563eb;}

.step{display:none;}
.step.active{display:block;}

label{font-weight:bold;font-size:14px;}

input,select,textarea{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-top:6px;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.full{grid-column:1/-1;}

.summary{
background:#f8fafc;
padding:20px;
border-radius:15px;
border:1px solid #eee;
}

.actions{
display:flex;
justify-content:space-between;
margin-top:25px;
gap:10px;
flex-wrap:wrap;
}

button{
padding:14px 20px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.prev{background:#e5e7eb;}
.next{background:#2563eb;color:white;}
.submit{background:#16a34a;color:white;}

.qr{text-align:center;}
.qr img{
width:220px;
border-radius:10px;
border:1px solid #ddd;
}

.upload-box{
border:2px dashed #ccc;
padding:20px;
text-align:center;
border-radius:12px;
cursor:pointer;
}
.upload-box:hover{border-color:#2563eb;}

.preview{
margin-top:10px;
text-align:center;
}
.preview img{
max-width:200px;
border-radius:10px;
}

/* LOADING */
#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
opacity:0;
visibility:hidden;
transition:0.3s;
}

#loading.active{
opacity:1;
visibility:visible;
}

.spinner{
width:50px;
height:50px;
border:5px solid #ddd;
border-top:5px solid #16a34a;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:15px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

@media(max-width:600px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <p>Memproses pendaftaran...</p>
</div>

<div class="container">
<div class="card">

<div class="header">
<div>
<h2>HERBALIFE RUN 2026</h2>
<small>(ICE) BSD CITY</small>
</div>
<div class="badge">Registration</div>
</div>

<div class="progress">
<div class="bar active"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<form id="form">

<!-- STEP 1 -->
<div class="step active">
<h3>Personal Information</h3>

<div class="grid">
<div>
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div>
<label>WhatsApp</label>
<input type="tel" id="wa" required>
</div>

<div>
<label>Email</label>
<input type="email" id="email" required>
</div>

<div>
<label>Date of Birth</label>
<input type="date" id="dob" required>
</div>

<div class="full">
<label>Address</label>
<textarea id="address" required></textarea>
</div>
</div>
</div>

<!-- STEP 2 -->
<div class="step">
<h3>Race Category</h3>

<label>Category</label>
<select id="category" required>
<option value="">Choose</option>
<option value="Kids Dash">Kids Dash : Rp.130.000</option>
<option value="Fun Walk">Fun Walk : Rp.150.000</option>
<option value="5K">5K : Rp.200.000</option>
<option value="10K">10K : Rp.350.000</option>
<option value="24K">24K : Rp.500.000</option>
</select>

<label>Shirt Size</label>
<select id="size" required>
<option value="">Choose</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>
</div>

<!-- STEP 3 -->
<div class="step">
<h3>Payment</h3>

<div class="qr">
<p>Scan QRIS untuk pembayaran</p>
<img src="qris.png">
</div>

<p style="margin-top:15px;">Setelah pembayaran, lanjut ke upload bukti</p>
</div>

<!-- STEP 4 -->
<div class="step">
<h3>Upload Bukti Pembayaran</h3>

<div class="upload-box" onclick="document.getElementById('file').click()">
Klik untuk upload bukti transfer
<input type="file" id="file" hidden>
</div>

<div class="preview" id="preview"></div>

<h3>Summary</h3>
<div class="summary" id="summary"></div>
</div>

<div class="actions">
<button type="button" class="prev" id="prevBtn">Kembali</button>
<button type="button" class="next" id="nextBtn">Berikutnya</button>
</div>

</form>
</div>
</div>

<script>
let step=0
const steps=document.querySelectorAll(".step")
const bars=document.querySelectorAll(".bar")

const next=document.getElementById("nextBtn")
const prev=document.getElementById("prevBtn")

function showStep(n){
steps.forEach((s,i)=>s.classList.toggle("active", i===n))
bars.forEach((b,i)=>b.classList.toggle("active", i<=n))
prev.style.display = n===0 ? "none":"inline-block"

if(n===steps.length-1){
next.textContent="Submit"
next.classList.replace("next","submit")
updateSummary()
}else{
next.textContent="Berikutnya"
next.classList.replace("submit","next")
}
}

next.onclick=function(){
if(step<steps.length-1){
step++
showStep(step)
}else{
document.getElementById("loading").classList.add("active")

setTimeout(()=>{
window.location.href="https://jotri623.github.io/PENDAFTARAN-HERBALIFE-RUN/"
},2000)
}
}

prev.onclick=function(){
if(step>0){ step--; showStep(step) }
}

document.getElementById("file").onchange=function(e){
const file=e.target.files[0]
if(file){
const reader=new FileReader()
reader.onload=function(ev){
document.getElementById("preview").innerHTML=
`<img src="${ev.target.result}">`
}
reader.readAsDataURL(file)
}
}

function updateSummary(){
document.getElementById("summary").innerHTML=`
<b>Nama:</b> ${document.getElementById("name").value}<br>
<b>WA:</b> ${document.getElementById("wa").value}<br>
<b>Email:</b> ${document.getElementById("email").value}<br>
<b>Category:</b> ${document.getElementById("category").value}<br>
<b>Size:</b> ${document.getElementById("size").value}
`
}

showStep(step)
</script>

</body>
</html>
